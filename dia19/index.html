<!DOCTYPE html>
<html lang='es'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Dia 19 </title>
    <link rel='icon' href='images/Aguila_2.0.webp' type='image/webp'>
    <link rel='stylesheet' href='css/main.css'>
    <script src="js/main.js"></script>
</head>

<body>

    <h2>Transiciones con Hover</h2>

    <div class="contenedor">
        <div class="caja caja1"></div>
        <div class="caja caja2"></div>
        <div class="caja caja3"></div>
    </div>

    <h2>Cambio de color y tamaño</h2>

    <div class="efecto"></div>

    <h2>Mostrar texto al pasar el ratón</h2>

    <div class="texto-hover">
        <span class="bocadillo">Aqui<br>toyyyy</span>
        <img src="images/ranita-e1453326928823.png" title="Soy una Ranita" alt="Icono">
    </div>

    <!-- Nivel 2 -->
    <h1>Nivel 2: Animaciones con @keyframes</h1>
    <div class="contenedor-animaciones">
        <div class="caja-animada ancho"></div>
        <div class="caja-animada rotacion"></div>
        <div class="caja-animada color"></div>
    </div>

    <div class="img-parpadea">
        <p class="texto-parpadeante">Este texto parpadea</p>
        <img src="images/images.jfif" title="Estoy parpadeando" alt="Icono">
    </div>
    <div class="zona-movimiento">
        <div class="cuadro-movil"></div>
    </div>
    <!-- Nivel 3 -->
    <h1>Nivel 3: Técnicas avanzadas de animación</h1>
    <section class="nivel3-scroll">
        <h2>Animación con scroll-timeline</h2>
        <div class="barra-scroll"></div>
    </section>
    <section class="nivel3-fill">
        <h2>animation-fill-mode</h2>
        <div class="caja-fill"></div>
    </section>

    <section class="nivel3-bezier">
        <h2>cubic-bezier</h2>
        <div class="caja-bezier"></div>
    </section>
</body>

</html>
